# Organic4D Engine — Phase 0 초안
services:
  backend:
    build:
      context: ./engine/backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ./engine/backend:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build:
      context: ./engine/frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    volumes:
      - ./engine/frontend:/app
      - /app/node_modules
    command: npm run dev
    depends_on:
      - backend
